spring.config.import=optional:file:./.env[.properties],optional:file:./server/.env[.properties],optional:file:../server/.env[.properties]
spring.application.name=Capstone Test
server.port=8088
spring.mongodb.uri=${MONGO_URI:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}

# Google Calendar integration settings
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8088/api/integrations/google/callback}
google.oauth.frontend-url=${GOOGLE_FRONTEND_URL:http://localhost:5173}
google.calendar.default-time-zone=${GOOGLE_CALENDAR_TIME_ZONE:America/New_York}